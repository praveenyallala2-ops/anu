<!DOCTYPE html>
<html>
<head>
    <title>Add Staff</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">

    <div class="navbar">
        <h2>➕ Add New Personnel</h2>
        <a href="/staff">Back to List</a>
    </div>

    <form method="POST">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="e.g. John Doe" required title="Please enter the full name of the officer">

        <label>Email Address</label>
        <input type="email" name="email" placeholder="e.g. john.doe@police.gov" required>

        <label>Phone Number</label>
        <input type="text" name="phone" placeholder="e.g. +91 9876543210" required>

        <label>Designated Rank</label>
        <select name="rank">
            <option>Inspector (SHO)</option>
            <option>Sub-Inspector (SI)</option>
            <option>Assistant Sub-Inspector (ASI)</option>
            <option>Head Constable (HC)</option>
            <option>Constable</option>
            <option>Woman Constable</option>
            <option>Home Guard</option>
        </select>

        <button type="submit">Complete Registration</button>
    </form>

</div>
</body>
</html>
