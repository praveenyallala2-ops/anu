<!DOCTYPE html>
<html>
<head>
    <title>Staff</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">

    <div class="navbar">
        <h2>👥 Personnel Management</h2>
        <a href="/">Dashboard</a>
    </div>

    <a href="/add" class="btn btn-add">➕ Add Staff</a>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Rank</th>
                    <th>Contact Info</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for s in staff %}
                <tr>
                    <td><span style="font-weight:700; color:var(--secondary)">#{{ s[0] }}</span></td>
                    <td><strong>{{ s[1] }}</strong></td>
                    <td>{{ s[2] }}</td>
                    <td>
                        <div style="font-size: 0.85rem; color: var(--text-muted);">📧 {{ s[3] }}</div>
                        <div style="font-size: 0.85rem; color: var(--text-muted);">📱 {{ s[4] }}</div>
                    </td>
                    <td>
                        <a href="/edit/{{ s[0] }}" class="btn" style="padding: 6px 12px; font-size: 0.8rem; background: #fff;">Edit</a>
                        <a href="/delete/{{ s[0] }}" class="btn" style="padding: 6px 12px; font-size: 0.8rem; background: #ffebee; color: #c62828;">Delete</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
