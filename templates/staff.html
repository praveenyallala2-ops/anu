<!DOCTYPE html>
<html>
<head>
    <title>Staff</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">

    <div class="navbar">
        <h2>👮 Staff Management</h2>
        <a href="/">Home</a>
    </div>

    <a href="/add" class="btn btn-add">➕ Add Staff</a>

    <div class="table-container">
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Rank</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>

            {% for s in staff %}
            <tr>
                <td>{{ s[0] }}</td>
                <td>{{ s[1] }}</td>
                <td>{{ s[2] }}</td>
                <td>{{ s[3] }}</td>
                <td>{{ s[4] }}</td>
                <td>
                    <a href="/edit/{{ s[0] }}">Edit</a> | 
                    <a href="/delete/{{ s[0] }}">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

</div>
</body>
</html>
