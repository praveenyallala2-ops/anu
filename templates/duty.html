<!DOCTYPE html>
<html>
<head>
<title>Duty</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">

<div class="navbar">
<h2>📋 Duty Chart</h2>
<a href="/">Home</a>
</div>

<div class="table-box">
<table>
<tr><th>Name</th><th>Rank</th><th>Shift</th><th>Date</th></tr>
{% for d in duty %}
<tr>
<td>{{ d[1] }}</td>
<td>{{ d[2] }}</td>
<td class="{% if d[3]=='Morning' %}morning{% elif d[3]=='Evening' %}evening{% else %}night{% endif %}">{{ d[3] }}</td>
<td>{{ d[4] }}</td>
</tr>
{% endfor %}
</table>
</div>

</div>
</body>
</html>
